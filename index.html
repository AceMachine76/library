<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#161b22}::-webkit-scrollbar-thumb{background:#00d4aa;border-radius:3px}

/* HEADER */
.hdr{background:#161b22;border-bottom:1px solid #21262d;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-size:42px;font-weight:800;display:flex;align-items:baseline;gap:8px}
.lm{color:#e6edf3}.la{color:#00d4aa}
.hdr-meta{font-size:15px;color:#8b949e;margin-top:4px;display:flex;gap:14px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:#00d4aa;display:inline-block;margin-right:5px}
.hdr-r{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.srch{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 15px;color:#e6edf3;font-size:15px;font-family:'Inter',sans-serif;outline:none;width:220px}
.srch:focus{border-color:#00d4aa}
.srch::placeholder{color:#484f58}
.addbtn{background:#00d4aa;color:#0d1117;border:none;border-radius:6px;padding:10px 22px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.addbtn:hover{opacity:0.85}

/* TABS */
.tabs{background:#161b22;border-bottom:1px solid #21262d;display:flex;padding:0 28px;overflow-x:auto}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:14px 20px;cursor:pointer;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:#8b949e;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab.on{color:#00d4aa;border-bottom-color:#00d4aa}
.tab:hover:not(.on){color:#e6edf3}
.tc{background:#21262d;border-radius:10px;padding:2px 9px;font-size:13px}
.tab.on .tc{background:#003d33;color:#00d4aa}

/* CONTENT */
.content{padding:20px 24px;max-width:1800px;margin:0 auto}
.all-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.cat-section{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px 16px}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sl{font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#e6edf3}
.sline{flex:1;height:1px;background:#21262d}
.sc{font-size:13px;color:#00d4aa;font-weight:600}

/* ALL-VIEW: horizontal scroll row per category */
.row{display:flex;flex-direction:row;gap:8px;flex-wrap:wrap;justify-content:center}

/* CATEGORY-VIEW: wrap grid */
.wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-bottom:36px;padding:0 20px}

/* SMALL CARD (all-view) */
.card-sm{background:#0d1117;border:1px solid #21262d;border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.15s,box-shadow 0.15s;display:flex;flex-direction:column;width:120px;height:265px;flex-shrink:0;flex-grow:0}
.card-sm:hover{border-color:#00d4aa;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,170,0.15)}
.card-sm .cov{height:170px}

/* LARGE CARD (category-view) */
.card-lg{background:#161b22;border:1px solid #21262d;border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.15s,box-shadow 0.15s;width:190px;height:355px;flex-shrink:0;flex-grow:0;display:flex;flex-direction:column}
.card-lg:hover{border-color:#00d4aa;transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,212,170,0.15)}
.card-lg .cov{height:245px;flex-shrink:0}

/* COVER */
.cov{position:relative;overflow:hidden;background:#1a2030;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cov img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.cgrad{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,14,20,0.95) 0%,rgba(10,14,20,0.4) 55%,transparent 100%)}
.cicon{font-size:32px;opacity:0.2;position:relative}
.rbadge{position:absolute;top:7px;right:7px;background:#00d4aa;color:#0d1117;border-radius:4px;padding:2px 7px;font-size:12px;font-weight:700;z-index:2}
.todo-badge{position:absolute;top:7px;left:7px;background:#e53e3e;color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;z-index:2;letter-spacing:0.5px}
.reading-badge{position:absolute;top:7px;left:7px;background:#dd6b20;color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;z-index:2;letter-spacing:0.5px}
.next-badge{position:absolute;top:7px;left:7px;background:#9b59b6;color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;z-index:2;letter-spacing:0.5px}

/* CARD INFO */
.binfo{padding:9px 10px;display:flex;flex-direction:column;height:95px;flex-shrink:0;overflow:hidden}
.card-sm .btitle{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:2px;color:#e6edf3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;height:32px;flex:none}
.card-sm .bauthor{font-size:11px;color:#8b949e;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sm .ctag{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;display:inline-block;margin-top:auto;align-self:flex-start}
.card-lg .btitle{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:3px;color:#e6edf3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;height:36px;flex:none}
.card-lg .bauthor{font-size:13px;color:#8b949e;margin-bottom:6px;}
.card-lg .ctag{border-radius:4px;padding:3px 8px;font-size:12px;font-weight:600;display:inline-block;align-self:flex-start;margin-top:auto}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;width:100%;max-width:680px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,0.7)}
.mhdr{display:flex;gap:18px;padding:24px;border-bottom:1px solid #21262d;flex-shrink:0}
.mcov{width:88px;height:124px;border-radius:6px;flex-shrink:0;object-fit:cover;object-position:center top;box-shadow:4px 4px 16px rgba(0,0,0,0.6)}
.mcovfb{width:88px;height:124px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px}
.mmeta{flex:1;min-width:0}
.mbadge{border-radius:4px;padding:3px 10px;font-size:13px;font-weight:600;display:inline-block;margin-bottom:9px}
.mtitle{font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.3;color:#e6edf3}
.mauthor{color:#8b949e;font-size:15px;margin-bottom:11px}
.stars{display:flex;gap:2px;align-items:center;user-select:none}
.star{font-size:17px;cursor:pointer}
.scount{font-size:14px;color:#8b949e;margin-left:6px}
.mcomment{color:#8b949e;font-size:14px;font-style:italic;margin-top:8px}
.mact{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.cbtn{background:#21262d;border:none;border-radius:6px;padding:6px 11px;font-size:16px;cursor:pointer;color:#8b949e}
.cbtn:hover{color:#e6edf3}
.dbtn{background:none;border:none;font-size:18px;cursor:pointer;color:#484f58}
.dbtn:hover{color:#f85149}

.flbl{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;font-weight:600}
.cinp{width:100%;background:transparent;border:none;border-bottom:1px solid #30363d;padding:5px 0;font-family:'Inter',sans-serif;font-size:15px;color:#e6edf3;outline:none}
.cinp:focus{border-bottom-color:#00d4aa}
.cinp::placeholder{color:#484f58}
.ssec{flex:1;overflow:auto;padding:20px 24px}
.sshdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.ebtn{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:6px 13px;font-size:13px;cursor:pointer;color:#8b949e;font-family:'Inter',sans-serif;font-weight:500}
.ebtn:hover{color:#00d4aa;border-color:#00d4aa}
.stxt{white-space:pre-wrap;font-size:15px;line-height:1.9;color:#c9d1d9}
.stxt .stitle{font-size:19px;font-weight:800;color:#e6edf3;display:block;margin-bottom:12px}
.sempty{color:#484f58;font-size:15px}
.starea{width:100%;min-height:280px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:15px;font-family:'Inter',sans-serif;font-size:15px;line-height:1.8;resize:vertical;outline:none;color:#e6edf3}
.starea:focus{border-color:#00d4aa}

/* ADD MODAL */
.amod{background:#161b22;border:1px solid #30363d;border-radius:12px;width:100%;max-width:450px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.atitle{font-size:22px;font-weight:700;margin-bottom:22px;color:#e6edf3}
.ff{margin-bottom:16px}
.ti{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:11px 13px;font-family:'Inter',sans-serif;font-size:15px;outline:none;color:#e6edf3}
.ti:focus{border-color:#00d4aa}
.ti::placeholder{color:#484f58}
.si{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:11px 13px;font-family:'Inter',sans-serif;font-size:15px;outline:none;color:#e6edf3}
.fbtns{display:flex;gap:10px;margin-top:22px}
.cancelbtn{flex:1;background:none;border:1px solid #30363d;border-radius:6px;padding:12px;font-family:'Inter',sans-serif;font-size:15px;cursor:pointer;color:#8b949e}
.okbtn{flex:1;background:#00d4aa;border:none;border-radius:6px;padding:12px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;color:#0d1117}
.okbtn:hover{opacity:0.85}
.empty{text-align:center;padding:60px 20px;color:#484f58}
.stats-ov{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.stats-modal{background:#161b22;border:1px solid #30363d;border-radius:12px;width:100%;max-width:580px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,0.7)}
.stats-hdr{display:flex;align-items:center;gap:10px;padding:20px 24px;border-bottom:1px solid #21262d;flex-shrink:0}
.stats-hdr-title{font-size:18px;font-weight:700;color:#e6edf3}
.stats-body{overflow:auto;padding:16px 24px}
.stats-section{margin-bottom:20px}
.stats-section-title{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#e6edf3;margin-bottom:10px;margin-top:4px}
.stats-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #21262d}
.stats-row:last-child{border-bottom:none}
.stats-book-title{font-size:14px;color:#c9d1d9;font-weight:400;flex:1}
.stats-rating{background:#00d4aa;color:#0d1117;border-radius:4px;padding:2px 8px;font-size:12px;font-weight:700;margin:0 12px;flex-shrink:0}
.stats-rating.none{background:#30363d;color:#8b949e}
.stats-sum-link{font-size:12px;color:#00d4aa;cursor:pointer;flex-shrink:0;font-weight:600}
.stats-sum-link:hover{text-decoration:underline}
.stats-sum-link.none{color:#484f58;cursor:default}
.stats-sum-link.none:hover{text-decoration:none}

.lock-btn{position:fixed;bottom:20px;right:20px;background:#21262d;border:1px solid #30363d;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:300;color:#8b949e}
.lock-btn:hover{border-color:#00d4aa;color:#00d4aa}
.readonly .star{pointer-events:none;cursor:default}
.readonly .ebtn{display:none}
.readonly .dbtn{display:none}
.readonly .cinp{pointer-events:none;background:transparent;color:#8b949e}
.readonly .addbtn{display:none}
</style>
</head>

L+WJZorGIMIncIsjk4UEkjA6k810nhuBrq8ex8R2mk/2dKjYkRoUaJu2ChzVb4dLbapYa34enkEcl9EGiJ9Vz/iDWHN4E8Rw3zWrabLwcGYf6vHru6Yq4q0U0rnLXkqtapTqTUbWtftbdarqZGr2cen6vd2kMyzRRSFUkU5DL2OfpVOpryKKG7ligk8yNG2h/wC9jvUNc73Pap35Fd30CiiikWFFFFABRRRQAUUUUAFFFFAFuw1O+0qfzrC6lt5O5jbGfr61oXHi7XblSJNQcEjBZFVWP4gZrEoqlKSVkzKVClOXNKKb9AJLEkkknkk1raf4n1rSrJrOy1CaGBsnYpHH09PwrJopKTWxU6cKi5Zq6NOHxFrFvYTWMWoTrbzsWkQN94nrz15qHT9Y1DSmZrC7kt2bq0fBP41Sop8z7k+wpWa5VrvoWb3ULvUp/OvJ2ml7u3U1Ysdf1XTIWisb6W3jb7wjOM/X1rOopczvcbpU3HkcVbsaFrrepWVy9xa3bwzP950ABqve391qM5nvJmmlPV26n61Xoo5nawKlBS5klc1dL8TazosbRafqEsMbHJQHK5+hqnfahd6ndNc3txJPM3V3OTVaijmbVrgqNOMnNRV+53Xh/TtYt/B76n4dnkkvZptk8cDfNGi9Pl7kn9KSDWfiH5gXdqKherTQbVH1LDAFcdaX93YS+ZZ3M0D/AN6Nyp/SrF5rmq6hH5d5qNzMn915CR+VaqorLc8+WCm5yclGSb3a1LHiTUFvtekuozG0mE8ySMYV5ABuYD0JqK48Ravd2YtLi/lktwMCJsFR9B2rMorNyd2zujh6ajGLV7bD4ZpLeZJYZGjkQ5V1OCDWxe+L/EGoWZtLrVJ5ICMMuQNw9yOtYlFJSa2ZU6NObUpRTaCiiikaBRRRQAUUUUAJmiiigAzRmiigAzRmiigAozRRQAUZoooAKM0UUAGaKKKADNGaKKADNGaKKADNGaKKACjNFFABmiiigAzRmiigAzRmiigAzRRRQB//2Q==", "summary": "How to Win Friends and Influence People\n\n1. Always Think From Their Perspective\n- How would you have reacted in their situation?\n- When fishing, think about what the fish likes \u2014 what do they want?\n- People act based on their own interests, not yours.\n\n2. Never Criticize, Condemn or Complain\n- Criticism puts people on the defensive.\n- It damages relationships and changes nothing.\n- Instead, try to understand why they act the way they do.\n\n3. Give Genuine, Sincere Praise\n- Everyone wants to feel important and appreciated.\n- Praise specific actions, not vague compliments.\n- Make people feel valued \u2014 it is the most powerful motivator.\n\n4. Be Genuinely Interested in Other People\n- Ask about their life, their interests, their goals.\n- Remember what they tell you and follow up.\n- People love those who show real curiosity about them.\n\n5. Smile and Use the Right Tone of Voice\n- Be happy, show passion and enthusiasm.\n- Your tone communicates more than your words.\n- A warm tone opens doors that arguments never will.\n\n6. Remember Names\n- A person's name is the sweetest sound to them.\n- Use it naturally in conversation.\n- Research what interests them before you meet.\n\n7. Listen Actively and Make People Feel Heard\n- Encourage others to talk about themselves.\n- Listen more than you speak.\n- Never interrupt \u2014 let them finish their thought.\n\n8. Start Conversations on Common Ground\n- Begin with something you both agree on.\n- Never start with disagreement or conflict.\n- Find shared values or experiences first \u2014 then build from there.\n\n9. Use the Sandwich Method and Ask Questions\n- Begin with genuine praise.\n- Deliver criticism or feedback indirectly.\n- End with encouragement.\n- Ask questions instead of giving direct orders \u2014 people commit more to their own decisions.\n- Use positive examples, not negative ones.\n\n10. Never Argue \u2014 Both Sides Lose\n- You cannot win an argument \u2014 even if you win, you lose.\n- Show sympathy: \"I understand how you think and it is tough, but also consider this.\"\n- Start with your own mistakes and admit faults directly.\n- Praise even small improvements with specific details."}, {"id": "4", "title": "The Real Happy Pill", "author": "Anders Hansen", "cat": "life", "rating": 5, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9789173630788-M.jpg", "summary": "Hj\u00e4rnstark - Anders Hansen\n\nThe core idea is simple: physical movement is the most powerful tool you have to upgrade your brain. Every walk, every run, every workout rewires your neural pathways \u2014 improving memory, mood, focus, and resilience. You do not need to be an athlete. You just need to move.\n\nKey numbers to remember:\n- 20-30 min of exercise, ideally jogging at a heart rate around 150\n- 30 min walking x5 per week = 20 min running x3 per week\n- Maximum effect: 45 min x3 runs per week\n- Reduces dementia risk by 40%\n\nEvery minute counts. All movement is good.\n\n1. Exercise Improves Memory\nPhysical activity \u2014 especially cardio \u2014 increases the formation of new brain cells in the hippocampus, a central part of memory and learning.\n\n2. Stress Becomes Easier to Handle\nRegular physical activity strengthens the brain's stress system, so you recover faster from pressured situations.\n\n3. Exercise Protects Against Depression\nPhysical activity increases levels of neurotransmitters such as serotonin, dopamine and noradrenaline, which means exercise can prevent and reduce depression.\n\n4. Physical Activity Counteracts Anxiety\nExercise dampens overactivity in the amygdala (the brain's alarm system) and makes you less prone to reacting with strong worry.\n\n5. Creativity Increases\nWhen you move, blood flow improves and the brain's network is activated in a way that makes it easier to think creatively and see connections.\n\n6. Exercise Improves Concentration and Focus\nPhysical activity strengthens the function of the frontal lobes (prefrontal cortex), which controls attention, planning and impulse control.\n\n7. Better Sleep\nPeople who exercise regularly fall asleep more easily, get deeper sleep and wake up more rested.\n\n8. Protection Against Dementia\nRegular physical activity reduces the risk of Alzheimer's and other dementia diseases by strengthening the brain's structure and blood vessels.\n\n9. Children and Young People Develop Stronger Cognitive Abilities\nExercise improves children's and young people's school results, concentration ability and impulse control.\n\n10. 30 Minutes a Day Goes a Long Way\nYou do not need extreme sessions \u2014 a brisk walk or light jogging 3-4 times per week gives measurable effects on the brain. Start small. Stay consistent. The brain will reward you."}, {"id": "5", "title": "The Psychology of Money", "author": "Morgan Housel", "cat": "investment", "rating": null, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9780857197689-M.jpg", "summary": "", "status": "todo"}, {"id": "7", "title": "Fooled by Randomness", "author": "Nassim Nicholas Taleb", "cat": "investment", "rating": null, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9780812975215-M.jpg", "summary": "", "status": "todo"}, {"id": "8", "title": "101 Thoughts on Stocks", "author": "Ludvig Rosenstam Ahman", "cat": "investment", "rating": 6, "comment": "Abstract but good info. Very beginner friendly", "cover": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD/2wCEAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDIBCQkJDAsMGA0NGDIhHCEyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMv/AABEIATwAyAMBIgACEQEDEQH/xAGiAAABBQEBAQEBAQAAAAAAAAAAAQIDBAUGBwgJCgsQAAIBAwMCBAMFBQQEAAABfQECAwAEEQUSITFBBhNRYQcicRQygZGhCCNCscEVUtHwJDNicoIJChYXGBkaJSYnKCkqNDU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6g4SFhoeIiYqSk5SVlpeYmZqio6Slpqeoqaqys7S1tre4ubrCw8TFxsfIycrS09TV1tfY2drh4uPk5ebn6Onq8fLz9PX29/j5+gEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoLEQACAQIEBAMEBwUEBAABAncAAQIDEQQFITEGEkFRB2FxEyIygQgUQpGhscEJIzNS8BVictEKFiQ04SXxFxgZGiYnKCkqNTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqCg4SFhoeIiYqSk5SVlpeYmZqio6Slpqeoqaqys7S1tre4ubrCw8TFxsfIycrS09TV1tfY2dri4+Tl5ufo6ery8/T19vf4+fr/2gAMAwEAAhEDEQA/ANyiiiu84gooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAoqt9vtftYtfNBmP8I5qzUqSezLnTnC3MrX1+QUUUVRAUUVWuL+0tTiadFP93OT+VS5KKu2XCnOo+WCbfkWaKzP7f07OPOb/vg1ct7y3uhmCZH9gefyqY1YSdotM2q4PEUlzVINLzTJ6KKK0OYKKKKACiioLq8t7KPfPIEB6DqT9BSbSV2XCEqklGCu32J6KajrIiupyrDIPtTqCWraMKKKKYgooooAKKKKACiis+/1aOzbyY1M1yeka9vrUTnGCvJm1ChUrz5Kauy5NPFbxGSZwiDqTXNaj4gknzFa5jj6F/4m/wAKm/snUNUlE1/L5S9k6kfQdqpazpkWnGHyndg4Od3qP/11wYirWlByirR/E+lyvCYCnXjTqSU6j7axVvzI9F51i3+p/ka7SuM0IZ1iD/gX8jXZ1eX/AMN+pz8TP/ao/wCFfmwoorI1+/NraCGM4lm4yOy9666lRU4uTPEwuGnia0aMN2U9W1x2kNtZMcZw0i9SfQU6y8OKyCS9dt7c7FPT6moPDlkJbhrpxlYuF/3v/rV1FclCn7b97V17I93MMWsv/wBjwelvifVv1/rsY8/hyzkQ+UXibsc5Fc7c2txpt0FclXHKu iigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigBDkAkDJ9KpLeyts+SME7t6nOVKjOKvdaYIo1ACxqAM4AHTPWokm9mbUpwinzRv8A0ykmoSF4VMa/vFVjwRjJ9/8AJpsepvJ5aiIK7EBhycZBPb6D86vLBCgwsSAeyigwQsMNEhxjqo7dKjkqdzp9thtf3ZT/ALQkJlxENsbEFueBkjOO/TtUkt4ySShVBVEVgcHknpz0AqwYIW6xIfqop2xeflHzDB460+Wfch1aF7qH9af8H7ygdQljm8lkRmBwzDODyOnp17+lSNfhY7Rio/fAFufug4/qRVoQxAYEaAYxjaPrSLBCoIWJACMEBRS5Z9xurh3b3P8Ag/5dyK2uvPYg7RkblXnOM457VZpqxorFlRQzdSByadWkU0tTmquDleCsgoooqjMKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKAP//Z", "summary": "101 Thoughts on Stocks\n\n1. Stick to What You Understand\n- Only invest in companies and industries you genuinely understand.\n- If you cannot explain what the company does, do not invest.\n\n2. Think About the Future and Trends\n- Where is the world heading in 5-10 years?\n- Invest in companies positioned to benefit from those trends.\n\n3. Do Not Time the Market\n- Nobody consistently predicts market movements.\n- Time in the market beats timing the market every time.\n\n4. Patience Is Rewarded\n- Great investments take time to play out.\n- The longer your horizon, the more compounding works in your favor.\n\n5. Higher Return = More Risk\n- There is no free lunch in investing.\n- Understand the risk you are taking before chasing returns.\n\n6. Moat - A Moat Around the Castle\n- The best companies have a competitive advantage that protects them.\n- Look for: brand strength, switching costs, network effects, cost advantages.\n\n7. Diversification\n- Spread across companies, sectors, and markets.\n- Allocate small percentages toward high-risk niches and future bets.\n- Never put everything in one basket.\n\n8. Two Sides of the Coin\n- Always look for information from both sides \u2014 bulls and bears.\n- Challenge your own thesis before investing.\n- Learn from your mistakes every time.\n\n9. Work and Add Capital \u2014 Do Not Over-Optimize\n- You earn more by working hard, saving, and consistently adding capital than by spending hours searching for the perfect stock.\n- Consistency beats perfection.\n\n10. Stocks Are a Marathon, Not a Sprint\n- No excessive risk in one company \u2014 a 50% drop takes on average 7 years to recover.\n- Only take risks and hold stocks you can handle emotionally.\n- Think long term. Stay calm. Keep going."}, {"id": "9", "title": "Atomic Habits", "author": "James Clear", "cat": "performance", "rating": 8, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9780735211292-M.jpg", "summary": "Atomic Habits - James Clear\n\n1. Small improvements create big results\nSmall 1% improvements every day build enormous effect over time through compound interest.\n\n2. Focus on systems, not goals\nGoals give direction, but it is your daily routines that determine whether you reach them.\n\n3. Build habits based on identity\nChange happens when you start acting like the person you want to become, not just chasing results.\n\n4. The four laws govern all habits\nMake the habit: obvious, attractive, easy and satisfying.\n\n5. Make good habits obvious\nUse triggers, habit stacking and clear environmental signals to start the right behavior.\n\n6. Make habits attractive\nLink the habit to something you enjoy and surround yourself with people who normalize the behavior.\n\n7. Make habits easy\nReduce friction, use the 2-minute rule and make it easy to start.\n\n8. Make habits satisfying\nReward yourself immediately and use positive emotions to reinforce the behavior.\n\n9. The environment shapes your behaviors\nDesign your surroundings so that the right choice is the easy choice - and the wrong choice becomes harder.\n\n10. Measure, follow up and build momentum\nTracking, visual proof and \"never miss twice\" keeps you on track and builds confidence."}, {"id": "11", "title": "Emotional Intelligence 2.0", "author": "Travis Bradberry", "cat": "performance", "rating": 5, "comment": "", "cover": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD//gA7Q1JF UAFABigAoAO1ABQAUAH40AFABQAfjQAUAFABQAUAFABQAUAFABQAUAGc0AFABQAUAFABQAUAFABQAUABoAKACgAoAKACgAoAKACgAoAKACgAoAKADHFABQAUAFABQAUAFABQAGgAoAKACgA70AGelAH/2Q==", "summary": "Emotional Intelligence 2.0\n\n1. The Two Brains Behind Every Decision\nRational Brain (Neocortex):\n- Logical thinking\n- Planning\n- Problem-solving\n\nEmotional Brain (Limbic System):\n- Feelings and impulses\n- Amygdala = emotion center\n- Hippocampus = memory (why emotions stick to memories)\n\nEQ = balancing these two systems.\n\n2. You Cannot Control Emotions - Only Your Reaction\n- Emotions appear automatically.\n- Your power is choosing how you respond.\n- Only 30% of 500,000 tested people could manage their emotions.\n\n3. The Five Core Emotions\n- Happiness\n- Sadness\n- Anger\n- Fear\n- Disgust\nThese emotions drive all behavior, especially under pressure.\n\n4. Identify Your Emotional Triggers\n- Everyone has different triggers.\n- Learn what activates your emotions.\n- Understand how your behavior affects others.\n- Self-awareness is the foundation of EQ.\n\n5. The Four Core EQ Skills\n- Self-Awareness: Recognizing your emotions and their impact.\n- Self-Management: Controlling impulses and choosing productive reactions.\n- Social Awareness: Understanding others' emotions, tone, and body language.\n- Relationship Management: Using emotional insight to build trust and communicate effectively.\n\n6. EQ Predicts Success More Than IQ\n- IQ is fixed.\n- EQ is trainable.\n- High EQ improves leadership, teamwork, communication, and decision-making.\n\n7. Practical Strategies to Build EQ\nSelf-Awareness:\n- Journal emotional triggers\n- Reflect on patterns\n\nSelf-Management:\n- Pause before reacting\n- Use breathing techniques\n- Set goals for emotional behavior\n\nSocial Awareness:\n- Observe tone, posture, micro-expressions\n- Practice active listening\n\nRelationship Management:\n- Give feedback constructively\n- Build trust through consistency\n- Communicate clearly and respectfully\n\n8. Emotional Plasticity - EQ Grows Like a Muscle\n- The brain rewires itself through repetition.\n- Visualization and positive self-talk build mental \"layers.\"\n- Each repetition makes emotional control easier next time.\n\n9. Ask Better Questions During Emotional Moments\n- What triggered this?\n- What am I actually feeling?\n- What response will help me succeed?\nThis shifts you from emotional reaction to logical action.\n\n10. Do Not Let Emotions Control Your Behavior\n- You cannot change the past.\n- You cannot control other people.\n- You can always control your focus, your reaction, and your next step.\n- Emotion becomes a strength only when you are in control of it."}, {"id": "12", "title": "Performing Under Pressure", "author": "Hendrie Weisinger", "cat": "performance", "rating": 9, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9780804136723-M.jpg", "summary": "Performing Under Pressure - The Master 10-Point Summary\n\n1. Pressure is not stress - and it always reduces performance\nStress is ongoing demand; pressure is the moment when the outcome matters, is uncertain, and you feel judged. Research on 250,000+ elite performers shows: no one performs better under pressure - only less badly.\n\n2. Choking happens when the brain shifts into survival mode\nUnder pressure, the fight-or-flight system activates, causing:\n- Memory loss\n- Hesitation\n- Tunnel vision\n- Poor communication\n- Loss of automatic skills\n- \"Brain fog\"\nThis is why people fail at tasks they normally execute perfectly.\n\n3. Overthinking kills automatic performance\nWhen experts start consciously thinking about actions they have done thousands of times, performance collapses. Pressure forces the brain to \"take control\" of skills that should run on autopilot.\n\n4. Reframe anxiety as excitement\nTrying to \"calm down\" lowers confidence and worsens performance. Instead, say: \"I am excited.\" This shifts your physiology toward clarity, energy, and focus.\n\n5. Downsize the moment - avoid the \"do or die\" mindset\nThinking \"this is my only chance\" triggers choking. Treat the moment as one of many opportunities, not a life-defining event. This reduces the perceived stakes and keeps your brain functional.\n\n6. Focus on the mission, not the outcome\nOutcome thinking = fear, hesitation, and panic. Mission thinking = clarity and execution. Stay locked on the next action, not the scoreboard, not the consequences.\n\n7. Fixate only on what you can control\nIgnore everything external: audience, expectations, results, opinions. Control only:\n- Breathing\n- Posture\n- Communication\n- Technical execution\n- Your next micro-decision\nThis keeps your brain in the present moment.\n\n8. Build your long-term C.O.T.E. Armor\nThe top 1-10% performers share four traits:\n- Confidence - built through repetition, visualization, micro-successes\n- Optimism - expecting good outcomes increases resilience\n- Tenacity - effort, grit, and persistence under difficulty\n- Enthusiasm - energy that elevates both you and your team\nThese traits dramatically reduce performance drop under pressure.\n\n9. Use a 2-5 minute pre-game routine\nEvery elite performer has one. It should include:\n- Deep breathing\n- Positive self-talk\n- Visualization of success\n- A physical cue (stretching, movement, music)\n\"You win the game before the game.\"\n\n10. Build mental layers through preparation and simulation\nPressure resilience is trained, not gifted. Use:\n- Visualization\n- Positive self-talk\n- Practicing under simulated pressure\n- Reviewing past successes\nEach repetition adds \"layers\" to your brain, making you more stable when the heat is on."}, {"id": "13", "title": "The Inner Game of Tennis", "author": "W. Timothy Gallwey", "cat": "performance", "rating": 8, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9780679778318-M.jpg", "summary": "The Inner Game of Tennis - W. Timothy Gallwey\n\n1. The Success Formula: Performance = Skill - Interference\nYou already have your skill going into the game (aim, gamesense, strats). Matches are won or lost based on how much interference (nervousness, anger, overthinking, self-doubt, tilting) you allow. Improving isn't just about more training \u2014 it's about subtracting the mental noise to perform at your best in every situation.\n\n2. Self 1 vs. Self 2 \u2014 The Critic vs. The Player\n- Self 1 is the conscious critic saying \"don't whiff!\" or \"how can I be this bad?\"\n- Self 2 is your subconscious \u2014 the muscle memory that has executed the same move 10,000 times.\n- When Self 1 starts giving orders mid-game, you become stiff. To win, you must quiet the Critic and let the Player (instinct) take over and get into the zone.\n\n3. Stop Judging \u2014 Focus on Facts\nStop calling a missed shot \"trash\" or \"embarrassing.\" Saying \"what an awful miss\" isn't analysis \u2014 it's noise. Observe objectively what happened. Facts help you correct your play; judgment leads to tilt and destroyed focus. Eliminate all useless noise.\n\n4. Program with Imagery, Not Words\nThe brain understands images better than verbal instructions. Instead of thinking \"I need to hold the angle exactly here,\" visualize the shot landing. Give your brain the target and your body will solve the technique automatically with your existing skill.\n\n5. The Zone Is a State, Not a Coincidence\nFlow happens when Self 1 goes quiet. It's not magic that makes you play well \u2014 it's the absence of self-criticism and overanalysis. You can train yourself into that flow state on purpose.\n\n6. Focus Is Trainable\nFocus drifts \u2014 that's normal. What matters is how quickly you notice and refocus. In a match, the moment your thoughts drift to the scoreboard, what teammates think, or a bad round, notice it and come back directly. A good tool: think about what you will do in the next round.\n\n7. Radical Trust in Muscle Memory\nIf you have trained properly, your hands know what to do. Confidence is the courage to let go of control. If you doubt yourself in the micro-second you act, you will miss. Whatever decision you have made \u2014 execute it with 100% commitment. A half-hearted decision is worse than a wrong one.\n\n8. Negative Loops Are Spreading\nA bad round bleeds into the next if you let it. The pro mindset: every round is isolated. What happened no longer exists \u2014 you cannot change it. Redirect your attention to what you can actually influence. Use positive self-thinking to build yourself up.\n\n9. Identify Your Mental Obstacles\nEveryone reacts differently to pressure. Do you get quiet? Frustrated? Tilted? Defensive? Identify your pattern. Once you recognize how Self 1 attacks you under pressure, it's easier to catch it and return to non-judgmental observation. Tense muscles and a stressed mind cannot perform at their normal level \u2014 find your pattern to find your solution.\n\n10. The Surfer's Mindset \u2014 Challenge Equals Growth\nThe best surfers want the biggest waves because they provide the greatest challenge. Treat a tough match situation as a big wave \u2014 an opportunity to grow, not a threat to your ego. Focus on what you can control: your decisions, communication, execution. The team that stays process-focused under pressure holds together \u2014 the team chasing the result falls apart.", "status": ""}, {"id": "14", "title": "Extreme Ownership", "author": "Jocko Willink", "cat": "performance", "rating": 6, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9781250067050-M.jpg", "summary": "Extreme Ownership - Jocko Willink\n\n1. Extreme Ownership: Take 100% responsibility for everything in your life. No excuses. If something goes wrong, look at what you could have done differently.\n\n2. Check the Ego: The ego blinds you to the truth and criticism. Be humble and prioritize the goal over being \"right\".\n\n3. Detach: When things get stressful: step back mentally, lift your gaze and see the whole playing field instead of getting stuck in details.\n\n4. Cover and Move: Cooperation is key. If your team wins but the others lose, the entire organization has failed. Help each other.\n\n5. Simple: Keep plans and communication so simple that everyone understands them immediately. Complexity creates chaos under stress.\n\n6. Prioritize and Execute: Do not try to do everything at once. Choose the most important problem, solve it completely, then move on to the next.\n\n7. Decentralized Command: Trust your team. Give them the goal (what/why) and let them decide for themselves how to solve the task.\n\n8. Believe: You must believe in the mission 100%. If you do not understand \"why\", ask your leader until you do - otherwise you cannot lead.\n\n9. Discipline Equals Freedom: The more disciplined your routines and systems are, the more freedom and room to act you get when the unexpected happens.\n\n10. Plan: Do not hope for the best. Identify the biggest risks in advance and plan for them."}, {"id": "15", "title": "Outlive", "author": "Peter Attia MD", "cat": "life", "rating": null, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9780593236598-M.jpg", "summary": "", "status": "next"}, {"id": "16", "title": "The Little Book of Common Sense Investing", "author": "John C. Bogle", "cat": "investment", "rating": 9, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9781119404507-M.jpg", "summary": "The Little Book of Common Sense Investing - John C. Bogle\n\nThe message of this book is brutally simple: the stock market is a zero-sum game before costs, and a loser's game after costs. The only guaranteed way to capture market returns is to stop paying for people who can't beat it \u2014 and just own it all.\n\n1. Don't Look for the Needle - Buy the Haystack\nTrying to pick the one winning stock is nearly impossible. Buying the entire market through a broad index fund guarantees you own all the winners \u2014 without guessing.\n\n2. Costs Are the Silent Killer of Returns\nEvery fee you pay (management fees, trading costs, taxes) comes directly out of your long-term compounding. In investing, you get what you don't pay for.\n\n3. Active Management Is a Losing Game\nMost professional fund managers fail to beat the market over time \u2014 especially after fees. Paying someone to underperform the index makes no mathematical sense.\n\n4. Reversion to the Mean Is Inevitable\nHot funds cool off. Star managers fade. Exceptional performance rarely lasts because everything eventually returns to average. Chasing winners is a losing strategy.\n\n5. Focus on Real Business Returns, Not Market Noise\nStock prices fluctuate wildly in the short term. Real returns come from:\n- Earnings growth\n- Dividends\n- Long-term business performance\nInvesting is owning companies, not gambling on price movements.\n\n6. Time Is Your Greatest Ally - Impulse Is Your Enemy\nMarkets are noisy and emotional. The best investors avoid reacting to headlines and short-term volatility. Long-term compounding does the heavy lifting \u2014 if you stay invested.\n\n7. Gross Returns vs. Net Returns\nThe market produces a total return (gross). Investors earn that return minus costs (net). Index funds keep costs near zero, meaning index investors consistently outperform the average active investor.\n\n8. Beware of \"This Time It's Different\" Thinking\nEvery generation believes new technology or trends change the rules. They don't. The fundamental math of investing \u2014 costs, compounding, diversification \u2014 never changes.\n\n9. Simplicity Beats Complexity\nWall Street sells complexity because it is profitable for them. But complexity adds cost, confusion, and risk. Simple, low-cost index funds outperform because they are transparent, diversified, and cheap.\n\n10. The Best Strategy Is to Have No Strategy\nBuy a total market index fund. Hold it forever. Ignore the noise. This \"no-strategy strategy\" requires no predictions, no timing, no ego \u2014 and historically produces superior long-term results."}, {"id": "17", "title": "Why Does the Stock Market Go Up?", "author": "Brian Feroldi", "cat": "investment", "rating": 8, "comment": "", "cover": "https://covers.openlibrary.org/b/isbn/9781735066172-M.jpg", "summary": "Why Does the Stock Market Go Up? - Brian Feroldi\n\nThis book answers one of the most important questions in personal finance with clarity and simplicity. Feroldi strips away the noise and explains the fundamental reason markets rise over time: businesses create value, and shareholders own that value.\n\n1. Stocks Are Not Lottery Tickets\nA stock is ownership in a real business. Behind every ticker symbol are employees, products, factories, customers, and profits. If the company creates value, your ownership becomes more valuable.\n\n2. Profit Is the Engine of Rising Stock Prices\nIn the short term, markets move on emotion. In the long term, they move on earnings. When a company consistently earns more money, its stock price eventually follows.\n\n3. Human Ingenuity Drives Long-Term Growth\nThe reason the stock market trends upward is simple: humans constantly innovate, solve problems, and increase productivity. Companies monetize that progress \u2014 and shareholders benefit.\n\n4. The Stock Market Is a Wealth-Creation Machine\nThe market allows ordinary people to benefit from the work of the smartest entrepreneurs on earth. It is the most effective tool ever created for building long-term wealth.\n\n5. Volatility Is the Fee, Not a Fine\nPrice drops and market swings are normal. They are not a penalty \u2014 they are the entry fee for earning long-term returns. No volatility = no reward.\n\n6. Price vs. Value\nPrice is what you pay. Value is what you get. The market often misprices stocks in the short term, but over time it almost always gets the value right.\n\n7. Compounding Starts Slow, Then Explodes\nThe early years of investing feel boring because growth is small in absolute numbers. But after 10-30 years, compounding becomes exponential. Patience is your greatest financial advantage.\n\n8. The Market Is Self-Correcting and Efficient Over Time\nCompanies that fail to create value eventually disappear. They get replaced by stronger, more efficient businesses. This is why index funds work so well \u2014 the index constantly replaces losers with winners.\n\n9. Inflation Is a Tailwind for Stocks\nCompanies can raise prices when inflation rises. Cash loses value. Stocks represent real assets that adjust upward with inflation, making them one of the best long-term inflation hedges.\n\n10. The Best Time to Start Was Yesterday\nBecause the market trends upward over decades, the biggest risk is not buying at the wrong time \u2014 it is staying out of the market. Time in the market beats timing the market.", "status": ""}, {"id": "18", "title": "The Investor", "author": "Jonas Bernhardsson", "cat": "investment", "rating": 6, "comment": "", "cover": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAsLCxUOFRUVFRsuIiIbIiI7KyArJzciJyc3Jzc3JzA3MDA+Ny4uNz4wNzlSOUI7ST45TjlSOVJQUFRbXlI3W30BFRULFRUVGxUVLk43Ij5QQhs5YFBePlBUUFA7aVBeTlAwUlA+SUk+PkI5QlA+VFRSIjtUTjdwOz43UE5bSTdUZP/AABEIAV4A9AMBIgACEQEDEQH/xACdAAABBQEBAAAAAAAAAAAAAAAAAQMEBQYCBxAAAQMCBAIFCAYHBgYCAwAAAQACAwQRBRIhMQZBEyJRcYEUMjVhc7GywTNCcpGhwhUjNFJidIMkQ0Sis8MWNkZjgpJT0SWFowEBAQEBAQAAAAAAAAAAAAAAAAECAwQRAQEAAgICAgICAgMAAAAAAAABAhESIQMxE0EiUQQyUmFygaH/2gAMAwEAAhEDEQA/APWUIQqBCEIBCEqBELpCmwiEqECIASoTYSyFy94Za6ZFbEbhBIQlskQCEIQCVCEELEpTDDnHbz0Wc8skJ07bb68lf4uwPpyDzPyKyc0XXF+Tmnb1xqdO2EvFc4awylxcQ487G4GuyuaOdk8eePa5WRq8T8mgENOLF51da5u5+U2G91pMIpDSQNjO4AutTHpjO23tZqLU/V8VLUSp+r4owfj81vcF2uI/Nb3LtAjnZQSVyyQPvZJN5jk1TbO8EElCEIBCEIBLZIhAtkICEAlXIKW6gVCEIBCVCCJVi+TxVIW3Lir2qbcNVU2PfuWpW5Ol4NglQNkLLAQhKgRCVCCJXTGCF7wLm1gFlJpbua2zvPb9g6s1tuN/wK1OIU/lMTou1ZSSAdIL6Ovt2kZfDkAjt49aQpp3wNBaC0knrAXksXkaE3DRY99lZ4FiD2WZJdwMRd/FcXJ+8KlrWNaxrvODXWygkalxO/qciir20skMuQhjIwbbloF7g9tmrcm4mWL0SCojqGZ43Zh9xHeNwmqndvivJqOd9JW1TA8xGnOri62cZnEeBvdaxvFkI6EV erm wealth. Low-cost index funds and simple strategies outperform because they keep more of your returns intact.\n\n5. Psychology Matters More Than Strategy\nMost investors lose money not because of bad strategies, but because of emotional decisions. Common mistakes include:\n- Panic selling\n- Greed during rallies\n- Herd behavior\n- Overconfidence\nEmotional control is a competitive advantage.\n\n6. Volatility Is Normal - The Long-Term Trend Is Up\nShort-term drops are part of the game. Over decades, the market rises due to innovation, productivity, and corporate profits. Volatility is the price you pay for high returns.\n\n7. Simple Strategies Work Best\nBernhardsson advocates for:\n- Monthly investing\n- Index funds\n- Long-term focus\n- Minimizing mistakes\nComplex strategies create stress and usually underperform.\n\n8. Your Investment Plan Matters More Than Market Conditions\nYou need a clear plan that defines:\n- How much you invest\n- What you invest in\n- How you handle downturns\n- When you rebalance\nA plan prevents emotional, impulsive decisions.\n\n9. Compound Interest Is the Real Engine of Wealth\nSmall, consistent investments grow massively over time. Compounding rewards discipline \u2014 not genius.\n\n10. The Best Investment Strategy Is the One You Actually Follow\nPerfect strategies are useless if you do not stick to them. Consistency, patience, and simplicity build wealth far more effectively than complexity or prediction.", "status": ""}, {"id": "19", "title": "The Champion's Mind", "author": "Jim Afremow", "cat": "performance", "rating": null, "comment": "", "cover": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxMTEhMQEhIWFhEXFRgaFRgWFxggFRoYGRcaFhgWGBgaHyggGBoxGxoWITEhJSkrLi4uGiAzODMtNygtMCsBCgoKDg0OGRAQFy0lHx0rLSsrKy01Ny0tLi0tKy0tKys4Ky0rLS0tLTEtKy0rLSstLTAtKystKy0rKzUtKy0rLf/AABEIARYAtQMBIgACEQEDEQH/xAAcAAEAAgMBAQEAAAAAAAAAAAAABQcDBAYCAQj/xABKEAACAQMCBAQCBgYGBQ0BAAABAgMABBESIQUGEzEHIkFRYXEUMkKBkaEjMzVSYrEVcnOys8EIJCY20WNkZXR1 function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

var EDIT_PASSWORD = "AlwaysTryhard";
var S = {
  books: JSON.parse(JSON.stringify(BOOKS)),
  active:"all", sel:null, addOpen:false, editing:false,
  search:"", hstar:null,
  nb:{title:"",author:"",cat:"life",rating:null,comment:"",cover:"",summary:""},
  loaded:false,
  editMode:false,
  statsOpen:false,
  statsSearch:'',
};

function openBook(id){
  var b = S.books.find(function(x){ return x.id === id; });
  if(b){ S.sel = JSON.parse(JSON.stringify(b)); S.editing = false; draw(); }
}

async function load(){
  try{
    var r = await window.storage.get("mylib12");
    if(r && r.value){
      var saved = JSON.parse(r.value);
      S.books = BOOKS.map(function(orig){
        var s = saved.find(function(x){ return x.id === orig.id; });
        if(!s) return JSON.parse(JSON.stringify(orig));
        return Object.assign(JSON.parse(JSON.stringify(orig)), {
          rating:  s.rating  !== undefined ? s.rating  : orig.rating,
          comment: s.comment !== undefined ? s.comment : orig.comment,
          summary: (s.summary !== undefined && s.summary !== "") ? s.summary : orig.summary
        });
      });
      saved.forEach(function(s){
        if(!BOOKS.find(function(o){ return o.id===s.id; })) S.books.push(s);
      });
    }
  } catch(ex){}
  S.loaded = true; draw();
}

async function save(){
  if(!S.loaded) return;
  try{ await window.storage.set("mylib12", JSON.stringify(S.books)); } catch(ex){}
}

function upd(id, u){
  S.books = S.books.map(function(b){ return b.id===id ? Object.assign({},b,u) : b; });
  if(S.sel && S.sel.id===id) S.sel = Object.assign({},S.sel,u);
  save(); draw();
}

function addBook(){
  if(!S.nb.title.trim()) return;
  S.books = S.books.concat([Object.assign({},S.nb,{id:String(Date.now())})]);
  S.nb = {title:"",author:"",cat:"life",rating:null,comment:"",cover:"",summary:""};
  S.addOpen = false; save(); draw();
}

function delBook(id){
  if(!confirm("Remove this book?")) return;
  S.books = S.books.filter(function(b){ return b.id!==id; });
  S.sel = null; save(); draw();
}

function starHTML(rating, pid, isNew){
  var h = "<div class='stars'>";
  for(var i=1; i<=10; i++){
    var on = i <= (S.hstar && S.hstar.p===pid ? S.hstar.n : (rating||0));
    h += "<span class='star' style='color:"+(on?"#00d4aa":"#30363d")+"'"
       + " onmouseenter=\"S.hstar={p:'"+pid+"',n:"+i+"};draw()\""
       + " onmouseleave=\"S.hstar=null;draw()\"";
    if(isNew && S.editMode) h += " onclick=\"S.nb.rating=S.nb.rating==="+i+"?null:"+i+";draw()\"";
    else if(S.editMode) h += " onclick=\"upd('"+pid+"',{rating:S.sel.rating==="+i+"?null:"+i+"})\"";
    h += ">&#9733;</span>";
  }
  if(rating) h += "<span class='scount'>"+rating+"/10</span>";
  return h + "</div>";
}

function cardHTML(book, size){
  var cat = CATS[book.cat];
  var cls = size === "lg" ? "card-lg" : "card-sm";
  var img = book.cover ? "<img src='"+esc(book.cover)+"' onerror='this.remove()'>" : "";
  var icon = book.cover ? "" : "<span class='cicon'>"+cat.icon+"</span>";
  var badge = book.rating ? "<div class='rbadge'>"+book.rating+"/10</div>" : "";
  var todo = book.status==="todo" ? "<div class='todo-badge'>TO DO</div>" : book.status==="reading" ? "<div class='reading-badge'>READING</div>" : book.status==="next" ? "<div class='next-badge'>NEXT ▶</div>" : "";
  return "<div class='"+cls+"' onclick=\"openBook('"+book.id+"')\">"
    + "<div class='cov'>"+img+"<div class='cgrad'></div>"+icon+badge+todo+"</div>"
    + "<div class='binfo'>"
    + "<div class='btitle'>"+esc(book.title)+"</div>"
    + "<div class='bauthor'>"+esc(book.author||"")+"</div>"
    + "<span class='ctag' style='background:"+cat.bg+";color:"+cat.color+"'>"+cat.icon+" "+cat.label+"</span>"
    + "</div></div>";
}

function refocusStats(pos){
  var el=document.getElementById("stats-srch");
  if(el){el.focus();try{el.setSelectionRange(pos,pos);}catch(e){}}
}

function refocusSearch(pos){
  var el = document.getElementById("srch");
  if(el){ el.focus(); try{ el.setSelectionRange(pos,pos); }catch(e){} }
}

function toggleEdit(){
  if(S.editMode){
    S.editMode = false; draw();
  } else {
    var pw = prompt("Enter password to edit:");
    if(pw === EDIT_PASSWORD){ S.editMode = true; draw(); }
    else if(pw !== null){ alert("Wrong password"); }
  }
}

function buildStatsModal(){
  var cats = [
    {key:"life", label:"Life Books", icon:"&#127807;"},
    {key:"investment", label:"Investment", icon:"&#128200;"},
    {key:"performance", label:"Performance", icon:"&#9889;"}
  ];
  var body = "";
  cats.forEach(function(c){
    var sq=(S.statsSearch||'').toLowerCase();
    var catMatch=!sq||c.label.toLowerCase().includes(sq)||c.key.toLowerCase().includes(sq);
    var books = S.books.filter(function(b){ return b.cat===c.key && (!sq||catMatch||b.title.toLowerCase().includes(sq)||(b.author||'').toLowerCase().includes(sq)); });
    books = books.slice().sort(function(a,b){ return (b.rating||0)-(a.rating||0); });
    if(!books.length) return;
    body += "<div class='stats-section'><div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'><div class='stats-section-title'>"+c.icon+" "+c.label+"</div></div>";
    books.forEach(function(b){
      var ratingEl = b.rating
        ? "<span class='stats-rating'>"+b.rating+"/10</span>"
        : "<span class='stats-rating none'>-</span>";
      var sumEl = b.summary
        ? "<span class='stats-sum-link' onclick=\"S.statsOpen=false;S.sel=Object.assign({},S.books.find(function(x){return x.id==='"+b.id+"'}));S.editing=false;draw()\">View Summary</span>"
        : "<span class='stats-sum-link none'>No summary</span>";
      body += "<div class='stats-row'><span class='stats-book-title'>"+esc(b.title)+"</span>"+ratingEl+sumEl+"</div>";
    });
    body += "</div>";
  });
  var sv = esc(S.statsSearch||"");
  return "<div class='stats-ov' onclick=\"S.statsOpen=false;S.statsSearch='';draw()\">"
    + "<div class='stats-modal' onclick='event.stopPropagation()'>"
    + "<div class='stats-hdr'><span class='stats-hdr-title'>All Books</span>"

    + "<input class='srch' id='stats-srch' placeholder='Search...' style='width:160px;font-size:13px;padding:6px 11px;margin-left:auto' value='"+sv+"' oninput='S.statsSearch=this.value;draw();refocusStats(this.value.length)'>"
    + "<button class='cbtn' onclick=\"S.statsOpen=false;S.statsSearch='';draw()\">&#10005;</button></div>"
    + "<div class='stats-body'>"+body+"</div>"
    + "</div></div>";
}

function draw(){
  var filtered = S.books.filter(function(b){
    return (S.active==="all" || b.cat===S.active)
      && (!S.search || b.title.toLowerCase().includes(S.search.toLowerCase())
          || (b.author||"").toLowerCase().includes(S.search.toLowerCase()));
  });

  var main = "";

  if(S.active === "all"){
    // Netflix-style: one horizontal scrolling row per category
    main = "<div class='all-grid'>";
    ["life","investment","performance"].forEach(function(cat){
      var C = CATS[cat];
      var cb = filtered.filter(function(b){ return b.cat===cat; });
      var sorted = cb.slice().sort(function(a,b){
        var aScore = a.rating ? 3 : (a.status==='reading' ? 2 : a.status==='next' ? 1.5 : 0);
        var bScore = b.rating ? 3 : (b.status==='reading' ? 2 : b.status==='next' ? 1.5 : 0);
        if(bScore !== aScore) return bScore - aScore;
        return (b.rating||0) - (a.rating||0);
      });
      var cards = sorted.map(function(b){ return cardHTML(b,"sm"); }).join("");
      main += "<div class='cat-section'>"
        + "<div class='sh' style='margin-bottom:12px'><div class='sl'>"+C.icon+" "+C.label+"</div><div class='sline'></div><div class='sc'>"+cb.length+"</div></div>"
        + "<div class='row'>"+cards+"</div>"
        + "</div>";
    });
    main += "</div>";
  } else {
    // Large grid for single category
    var cards = filtered.map(function(b){ return cardHTML(b,"lg"); }).join("");
    main = "<div class='wrap'>"+cards+"</div>";
  }

  if(!filtered.length) main = "<div class='empty'><div style='font-size:44px;margin-bottom:12px'>&#128218;</div><div style='font-size:19px;font-weight:600;color:#8b949e'>No books found</div></div>";

  // Modal
  var modal = "";
  if(S.sel){
    var b=S.sel; var cat=CATS[b.cat]; var id=b.id;
    var imgEl = b.cover
      ? "<img class='mcov' src='"+esc(b.cover)+"' onerror='this.remove()'>"
      : "<div class='mcovfb' style='background:"+cat.bg+"'>"+cat.icon+"</div>";
    modal = "<div class='ov" + (S.editMode ? "" : " readonly") + "' onclick=\"S.sel=null;S.editing=false;draw()\">"
      + "<div class='modal' onclick='event.stopPropagation()'>"
      + "<div class='mhdr'>"+imgEl
      + "<div class='mmeta'>"
      + "<span class='mbadge' style='background:"+cat.bg+";color:"+cat.color+"'>"+cat.icon+" "+cat.label+"</span>"
      + "<div class='mtitle'>"+esc(b.title)+"</div>"
      + (b.author ? "<div class='mauthor'>"+esc(b.author)+"</div>" : "")
      + starHTML(b.rating,id,false)
      + (b.comment ? "<div class='mcomment'>&ldquo;"+esc(b.comment)+"&rdquo;</div>" : "")
      + "</div>"
      + "<div class='mact'>"
      + "<button class='cbtn' onclick=\"S.sel=null;S.editing=false;draw()\">&#10005;</button>"
      + "<button class='dbtn' onclick=\"delBook('"+id+"')\">&#128465;</button>"
      + "</div></div>"

      + "<div class='ssec'>"
      + "<div class='sshdr'><span class='flbl'>Summary &amp; Notes</span>"
      + "<button class='ebtn' onclick='S.editing=!S.editing;draw()'>"+(S.editing?"&#10003; Save":"&#9998; Edit")+"</button></div>"
      + (S.editing
          ? "<textarea class='starea' oninput=\"upd('"+id+"',{summary:this.value})\">"+esc(b.summary||"")+"</textarea>"
          : b.summary
            ? "<div class='stxt'><span class='stitle'>"+esc(b.summary.split('\n')[0])+"</span>"+esc(b.summary.split('\n').slice(1).join('\n')).replace(/\n/g,"<br>").replace(/(\d+\. [^<]+)(<br>)/g,"<strong>$1</strong>$2")+"</div>"
            : "<div class='sempty'>No summary yet. Click Edit to add notes.</div>")
      + "</div></div></div>";
  }

  // Add modal
  var addModal = "";
  if(S.addOpen){
    var nb=S.nb;
    addModal = "<div class='ov' onclick=\"S.addOpen=false;draw()\">"
      + "<div class='amod' onclick='event.stopPropagation()'>"
      + "<div class='atitle'>Add Book</div>"
      + "<div class='ff'><span class='flbl'>Title *</span><input class='ti' value='"+esc(nb.title)+"' oninput='S.nb.title=this.value' placeholder='Book title'></div>"
      + "<div class='ff'><span class='flbl'>Author</span><input class='ti' value='"+esc(nb.author)+"' oninput='S.nb.author=this.value' placeholder='Author name'></div>"
      + "<div class='ff'><span class='flbl'>Category</span>"
      + "<select class='si' onchange='S.nb.cat=this.value;draw()'>"
      + "<option value='life'"+(nb.cat==="life"?" selected":"")+">Life Books</option>"
      + "<option value='investment'"+(nb.cat==="investment"?" selected":"")+">Investment</option>"
      + "<option value='performance'"+(nb.cat==="performance"?" selected":"")+">Performance</option>"
      + "</select></div>"
      + "<div class='ff'><span class='flbl'>Rating</span>"+starHTML(nb.rating,"new",true)+"</div>"
      + "<div class='fbtns'><button class='cancelbtn' onclick=\"S.addOpen=false;draw()\">Cancel</button>"
      + "<button class='okbtn' onclick='addBook()'>Add Book</button></div>"
      + "</div></div>";
  }

  var tc = {
    all:S.books.length,
    life:S.books.filter(function(b){return b.cat==="life";}).length,
    investment:S.books.filter(function(b){return b.cat==="investment";}).length,
    performance:S.books.filter(function(b){return b.cat==="performance";}).length
  };
  var tabHTML = ["all","life","investment","performance"].map(function(v){
    var lbl={all:"All",life:"Life",investment:"Investment",performance:"Performance"};
    return "<button class='tab"+(S.active===v?" on":"")+"' onclick=\"S.active='"+v+"';draw()\">"+lbl[v]+"<span class='tc'>"+tc[v]+"</span></button>";
  }).join("");

  document.getElementById("app").innerHTML =
    "<div class='hdr'><div>"
    + "<div class='logo'><span class='lm'>MY</span><span class='la'>LIBRARY</span></div>"
    + "<div class='hdr-meta'><span onclick=\"S.statsOpen=true;draw()\" style='cursor:pointer'><span class='dot'></span>"+S.books.length+" books</span>"
    + "<span>|</span><span onclick=\"S.statsOpen=true;draw()\" style='cursor:pointer'>"+S.books.filter(function(b){return b.rating;}).length+" rated</span>"
    + "<span>|</span><span onclick=\"S.statsOpen=true;draw()\" style='cursor:pointer'>"+S.books.filter(function(b){return b.summary;}).length+" with summary</span>"
    + "<span>|</span><a href='https://docs.google.com/spreadsheets/d/1KMGYwlKdBpUadJkVP3FZ1CjxfE3JvpBG0Pg1u_XWCr4/edit?gid=0#gid=0' target='_blank' style='color:#00d4aa;text-decoration:none;font-weight:600;display:flex;align-items:center;gap:5px'>&#128196; Full Summary Sheet</a></span></div>"
    + "</div><div class='hdr-r'>"
    + "<input class='srch' id='srch' placeholder='Search...' value='"+esc(S.search)+"' oninput='S.search=this.value;draw();refocusSearch(this.value.length)'>"
    + (S.editMode ? "<button class='addbtn' onclick='S.addOpen=true;draw()'>+ Add Book</button>" : "")
    + "</div></div>"
    + "<div class='tabs'>"+tabHTML+"</div>"
    + "<div class='content'>"+main+"</div>"
    + modal+addModal
    + "<button class='lock-btn' onclick='toggleEdit()' title='" + (S.editMode ? "Lock editing" : "Unlock editing") + "'>" + (S.editMode ? "&#128275;" : "&#128274;") + "</button>"
    + (S.statsOpen ? buildStatsModal() : "");
}

draw();
load();
</script>
</body>
</html>
